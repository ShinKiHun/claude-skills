repository:
  name: "claude-skills"
  owner: "ShinKiHun"
  purpose: "Shared Claude Code and Codex research workflows and reference libraries"

global_rules:
  path: "global/user-CLAUDE.md"
  installs_to: "~/.claude/CLAUDE.md"
  install_with: "./install.sh --global-rules   |   .\\install.ps1 -GlobalRules"
  opt_in: true
  use_for:
    - "Always-on caveman output style, without typing /caveman each session."
    - "Requiring grilling agreement before designing a cell or submitting a long calculation."
    - "The user's three code rules: print results, re-review after finishing, fix errors in borrowed code."

prompt_library:
  catalog: "prompt-library/catalog.yaml"
  collection_count: 1
  prompt_count: 7
  use_for:
    - "Finding examples when the user asks to reference stored prompts."
    - "Extracting reusable structures for a new task-specific prompt."

resource_library:
  catalog: "resource-library/catalog.yaml"
  collection_count: 3
  resource_count: 12
  use_for:
    - "Finding external Skills, MCP servers, tools, and setup guides."
    - "Keeping third-party resources separate from locally maintained Skills."
    - "Selecting a tested visual direction and accessible palette for research artifacts."

routing:
  - intent: "find-or-reference-a-prompt"
    read_first: "prompt-library/catalog.yaml"
    examples:
      - "참고할 만한 프롬프트 찾아줘"
      - "저장해둔 프롬프트를 참고해서 작성해줘"
  - intent: "find-an-external-skill-or-tool"
    read_first: "resource-library/catalog.yaml"
    examples:
      - "쓸 만한 디자인 스킬 찾아줘"
      - "외부 MCP나 도구 추천해줘"
  - intent: "install-or-run-a-local-skill"
    read_first: "catalog.yaml#skills"
    examples:
      - "내 GitHub에서 필요한 스킬 받아서 적용해"

skills:
  - name: "expand-task-brief"
    path: "skills/expand-task-brief"
    status: "active"
    purpose: "Expand short or underspecified complex requests into execution-ready briefs and carry out the work."
    triggers:
      - "The user gives a short request for a complex artifact or workflow."
      - "The user asks for a stronger, structured, or reusable prompt."
      - "Requirements must be inferred while protecting scientific integrity."

  - name: "meeting-report"
    path: "skills/meeting-report"
    status: "active"
    purpose: "Create polished daily and weekly research meeting reports as self-contained HTML."
    triggers:
      - "자료 제작"
      - "총자료 제작"
      - "daily research report"
      - "weekly meeting report"

  - name: "caveman"
    path: "skills/caveman"
    status: "active"
    purpose: "Compress response output while keeping every technical detail. Customized fork of JuliusBrussee/caveman (MIT)."
    upstream: "https://github.com/JuliusBrussee/caveman"
    triggers:
      - "간결하게"
      - "짧게"
      - "토큰 줄여"
      - "결론만"
      - "/caveman"
      - "The user asks for shorter or cheaper output."
      - "Always on when global/user-CLAUDE.md is installed."

  - name: "grilling"
    path: "skills/grilling"
    status: "active"
    purpose: "Interview the plan one question at a time until shared understanding, before writing code. Customized fork of mattpocock/skills (MIT)."
    upstream: "https://github.com/mattpocock/skills"
    triggers:
      - "갈궈봐"
      - "계획 물어봐"
      - "하나씩 물어봐"
      - "합의부터 하자"
      - "/grilling"
      - "A new Matlantis cell or long-running calculation is being designed."
      - "A methodology decision would change how results are interpreted."

  - name: "handoff"
    path: "skills/handoff"
    status: "active"
    purpose: "Session continuity: load yesterday's context on start, write handoff note on end, monthly archive + transcript prune. Works in any project folder with CLAUDE.md/LOG.md/STATUS.md."
    triggers:
      - "이어서"
      - "어디까지 했지"
      - "저장"
      - "핸드오프"
      - "오늘 정리"
      - "월간 정리"
      - "resume / hand off session"

  - name: "apple-design"
    path: "skills/apple-design"
    status: "active"
    purpose: "Apple's interface design and fluid motion principles (WWDC 'Designing Fluid Interfaces'), translated to the web. Vendored verbatim from emilkowalski/skills (MIT)."
    upstream: "https://github.com/emilkowalski/skills"
    license: "MIT (c) 2026 Emil Kowalski — see skills/apple-design/LICENSE"
    triggers:
      - "애플 디자인"
      - "제스처 UI"
      - "스프링 애니메이션"
      - "시트/드래그/스와이프 인터랙션"
      - "Building or reviewing gesture-driven UI, spring/momentum/interruptible motion."
      - "Translucent materials, depth, optical typography, reduced-motion."

  - name: "emil-design-eng"
    path: "skills/emil-design-eng"
    status: "active"
    purpose: "Emil Kowalski's design-engineering philosophy: UI polish, component design, animation decisions, invisible details. Vendored verbatim from emilkowalski/skills (MIT)."
    upstream: "https://github.com/emilkowalski/skills"
    license: "MIT (c) 2026 Emil Kowalski — see skills/emil-design-eng/LICENSE"
    triggers:
      - "디자인 엔지니어링"
      - "UI 다듬기"
      - "컴포넌트 디자인"
      - "디테일 살려줘"
      - "Deciding UI polish, component API, or whether an animation earns its place."

  - name: "review-animations"
    path: "skills/review-animations"
    status: "active"
    purpose: "Review animation/motion code against a strict craft bar; approval is earned, default is flagging. Vendored verbatim from emilkowalski/skills (MIT). Note: SKILL.md sets disable-model-invocation (explicit invoke only)."
    upstream: "https://github.com/emilkowalski/skills"
    license: "MIT (c) 2026 Emil Kowalski — see skills/review-animations/LICENSE"
    triggers:
      - "애니메이션 리뷰"
      - "모션 검토"
      - "/review-animations"
      - "Reviewing a diff that adds or changes animation/motion code."

  - name: "improve-animations"
    path: "skills/improve-animations"
    status: "active"
    purpose: "Audit a codebase's motion as a senior advisor, then emit a prioritized, self-contained implementation plan for other agents to execute. Read-only on source. Vendored verbatim from emilkowalski/skills (MIT)."
    upstream: "https://github.com/emilkowalski/skills"
    license: "MIT (c) 2026 Emil Kowalski — see skills/improve-animations/LICENSE"
    triggers:
      - "애니메이션 개선"
      - "모션 감사"
      - "앱 느낌 좋게"
      - "improve the animations / audit the motion"
      - "Wants a roadmap of animation fixes rather than a single-diff review."

  - name: "animation-vocabulary"
    path: "skills/animation-vocabulary"
    status: "active"
    purpose: "Reverse-lookup glossary: turn a vague description of a motion effect into its exact term (e.g. 'bouncy thing when a popover opens' → Pop in). Naming, not building. Vendored verbatim from emilkowalski/skills (MIT)."
    upstream: "https://github.com/emilkowalski/skills"
    license: "MIT (c) 2026 Emil Kowalski — see skills/animation-vocabulary/LICENSE"
    triggers:
      - "이거 뭐라고 불러"
      - "이 효과 이름"
      - "what's it called when…"
      - "Describing a motion effect without knowing its name, to prompt an AI/designer."

  - name: "paper-report"
    path: "skills/paper-report"
    status: "active"
    purpose: "Turn user-supplied research paper PDFs (and our own result data) into a figure-rich, professor-facing Korean research-meeting report as self-contained HTML + PNG figures. Extracts the papers' own figures from the PDF, plots our calculation data, and renders concept diagrams in one visual system."
    triggers:
      - "논문 미팅자료"
      - "논문 보고자료"
      - "사전조사 자료 제작"
      - "논문 figure 뽑아서 자료"
      - "The user supplies paper PDFs and wants a figure-rich survey/meeting report."

external_projects:
  - name: "computational-paper-review-deck"
    url: "https://github.com/ShinKiHun/computational-paper-review-deck"
    use_for: "A standalone computational-science journal-club deck project."

  - name: "claude-codex-battery-windows"
    url: "https://github.com/ShinKiHun/claude-codex-battery-windows"
    use_for: "A standalone Windows usage monitor application."
