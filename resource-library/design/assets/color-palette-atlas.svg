<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1050" viewBox="0 0 1200 1050" role="img" aria-labelledby="title desc">
  <title id="title">Research presentation color palette atlas</title>
  <desc id="desc">Thirteen paired palettes for research presentations, visualizations, and web artifacts.</desc>
