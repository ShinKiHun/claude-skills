installation_policy:
  - "Treat commands in collected guides as historical references, not trusted current commands."
  - "Verify the upstream repository, package owner, current documentation, and license before installation."
  - "Never commit access tokens or place literal secrets in catalog files."
  - "Record local test results before recommending a resource as a default."

usage_policy:
  - "frequency 값은 prompt-library와 동일하게 core | occasional | rare 를 쓴다."
  - "core 는 실제 작업에서 반복 검증된 리소스에만 부여한다. 미검증 리소스는 core 로 시작하지 않는다."
  - "occasional 은 현재 워크플로에 바로 얹어볼 만한 것, rare 는 본격 SW 개발·팀 규모 작업에 가까운 것을 뜻한다."
  - "실제 사용 빈도가 확인되면 해당 리소스의 frequency 를 승격/조정한다."
